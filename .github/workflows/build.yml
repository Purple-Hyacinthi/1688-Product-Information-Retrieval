name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for manual release (e.g., v1.2.3)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Windows executable
      run: |
        if (Test-Path dist) { Remove-Item -Recurse -Force dist }
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        
        pyinstaller --clean --noconfirm build.spec
        
        $release_dir = "release-windows"
        New-Item -ItemType Directory -Force -Path $release_dir
        
        if (Test-Path "dist/1688_Product_Search.exe") {
            Copy-Item -Path "dist/1688_Product_Search.exe" -Destination "$release_dir/"
        } elseif (Test-Path "dist/1688_Product_Search/1688_Product_Search.exe") {
            Copy-Item -Path "dist/1688_Product_Search/1688_Product_Search.exe" -Destination "$release_dir/"
        } else {
            Write-Error "Executable not found in dist directory"
            exit 1
        }
        Copy-Item -Recurse -Path "config" -Destination "$release_dir/"
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: 1688-product-search-windows
        path: release-windows/
        retention-days: 7

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build macOS app
      run: |
        rm -rf dist build
        
        pyinstaller --clean --noconfirm build.spec
        
        release_dir="release-macos"
        mkdir -p "$release_dir"
        
        if [ -d "dist/1688 Product Search.app" ]; then
          cp -R "dist/1688 Product Search.app" "$release_dir/"
        elif [ -f "dist/1688_Product_Search" ]; then
          cp "dist/1688_Product_Search" "$release_dir/"
        else
          echo "Error: Executable not found in dist/"
          exit 1
        fi
        
        cp -R config "$release_dir/"
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: 1688-product-search-macos
        path: release-macos/
        retention-days: 7

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine tag name
      id: get_tag
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          TAG="${{ github.event.inputs.tag_name }}"
          if [[ -z "$TAG" ]]; then
            echo "Error: tag_name input is required for manual release"
            exit 1
          fi
        else
          TAG="${GITHUB_REF#refs/tags/}"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

    - name: Download artifacts
      run: mkdir -p release-files

    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: 1688-product-search-windows
        path: release-files/windows

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: 1688-product-search-macos
        path: release-files/macos

    - name: Create source code archive
      run: |
        zip -r source-code.zip . -x "*.git*" -x "release-files/*" -x "release-windows/*" -x "release-macos/*"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_tag.outputs.tag }}
        name: Release ${{ steps.get_tag.outputs.tag }}
        files: |
          release-files/windows/**
          release-files/macos/**
          source-code.zip
        overwrite_files: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
